<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Combo Chain Arena - Game Jam Prototype</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser-arcade-physics.min.js"></script>
    <style>
        body { margin: 0; background: #111; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; color: white; font-family: sans-serif; }
        canvas { border: 4px solid #333; box-shadow: 0 0 20px rgba(0,0,0,0.5); }
        #ui-layer { position: absolute; top: 20px; left: 20px; pointer-events: none; }
    </style>
</head>
<body>

<div id="ui-layer">
    <div id="score">Score: 0</div>
    <div id="combo" style="font-size: 24px; font-weight: bold; color: #fbff00;">Combo: 0</div>
    <div id="stats" style="font-size: 12px; color: #aaa;">Speed: 100% | Damage: 100%</div>
</div>

<script>
/**
 * COMBO CHAIN ARENA - CORE ARCHITECTURE
 * 1. GameManager: State & Multiplier logic
 * 2. Player: Movement & Stat Application
 * 3. Spawner: Combo-based difficulty scaling
 */

class MainScene extends Phaser.Scene {
    constructor() {
        super('MainScene');
    }

    preload() {
        // Create simple shapes for assets
        let graphics = this.make.graphics();
        
        // Player (Blue Square)
        graphics.fillStyle(0x0088ff, 1);
        graphics.fillRect(0, 0, 32, 32);
        graphics.generateTexture('player', 32, 32);
        graphics.clear();

        // Projectile (Yellow Circle)
        graphics.fillStyle(0xffff00, 1);
        graphics.fillCircle(4, 4, 4);
        graphics.generateTexture('bullet', 8, 8);
        graphics.clear();

        // Enemies
        graphics.fillStyle(0xff4444, 1); // Basic (Red)
        graphics.fillRect(0, 0, 24, 24);
        graphics.generateTexture('enemy_basic', 24, 24);
        graphics.clear();

        graphics.fillStyle(0xffaa00, 1); // Fast (Orange)
        graphics.fillRect(0, 0, 16, 16);
        graphics.generateTexture('enemy_fast', 16, 16);
        graphics.clear();

        graphics.fillStyle(0x8800ff, 1); // Tank (Purple)
        graphics.fillRect(0, 0, 40, 40);
        graphics.generateTexture('enemy_tank', 40, 40);
        graphics.clear();

        graphics.fillStyle(0xffffff, 1); // Boss (White)
        graphics.fillRect(0, 0, 80, 80);
        graphics.generateTexture('boss', 80, 80);
    }

    create() {
        // 1. Initialize Systems
        this.score = 0;
        this.combo = 0;
        this.bossActive = false;
        
        // Groups
        this.bullets = this.physics.add.group({ classType: Bullet, runChildUpdate: true });
        this.enemies = this.physics.add.group();

        // 2. Setup Player
        this.player = this.physics.add.sprite(400, 300, 'player');
        this.player.setCollideWorldBounds(true);
        this.cursors = this.input.keyboard.createCursorKeys();
        this.wasd = this.input.keyboard.addKeys('W,A,S,D');

        // 3. Spawner Logic
        this.spawnTimer = this.time.addEvent({
            delay: 1500,
            callback: this.spawnEnemyBatch,
            callbackScope: this,
            loop: true
        });

        // 4. Collisions
        this.physics.add.overlap(this.bullets, this.enemies, this.hitEnemy, null, this);
        this.physics.add.overlap(this.player, this.enemies, this.hitPlayer, null, this);

        // 5. Input
        this.input.on('pointerdown', () => this.shoot());
    }

    update() {
        this.handlePlayerMovement();
        
        // Rotate player to mouse
        let angle = Phaser.Math.Angle.Between(this.player.x, this.player.y, this.input.x, this.input.y);
        this.player.setRotation(angle);

        // Enemy AI: Move towards player
        this.enemies.getChildren().forEach(enemy => {
            this.physics.moveToObject(enemy, this.player, enemy.speed);
        });
    }

    handlePlayerMovement() {
        const mods = this.getModifiers();
        const speed = 200 * mods.speed;
        
        this.player.setVelocity(0);

        if (this.cursors.left.isDown || this.wasd.A.isDown) this.player.setVelocityX(-speed);
        else if (this.cursors.right.isDown || this.wasd.D.isDown) this.player.setVelocityX(speed);

        if (this.cursors.up.isDown || this.wasd.W.isDown) this.player.setVelocityY(-speed);
        else if (this.cursors.down.isDown || this.wasd.S.isDown) this.player.setVelocityY(speed);
    }

    shoot() {
        const mods = this.getModifiers();
        let bullet = this.bullets.get(this.player.x, this.player.y);
        if (bullet) {
            bullet.fire(this.player.x, this.player.y, this.player.rotation, 1 * mods.damage);
        }
    }

    spawnEnemyBatch() {
        if (this.bossActive) return;

        if (this.combo >= 50) {
            this.spawnBoss();
            return;
        }

        let type = 'enemy_basic';
        let hp = 1;
        let speed = 100;

        if (this.combo >= 25 && Math.random() > 0.7) {
            type = 'enemy_tank'; hp = 5; speed = 40;
        } else if (this.combo >= 10 && Math.random() > 0.5) {
            type = 'enemy_fast'; hp = 1; speed = 180;
        }

        this.createEnemy(type, hp, speed);
    }

    createEnemy(key, hp, speed) {
        let x = Math.random() > 0.5 ? -50 : 850;
        let y = Phaser.Math.Between(0, 600);
        let enemy = this.enemies.create(x, y, key);
        enemy.health = hp;
        enemy.speed = speed;
    }

    spawnBoss() {
        this.bossActive = true;
        this.enemies.clear(true, true); // Clear minions
        this.createEnemy('boss', 100, 60);
        document.getElementById('combo').innerText = "BOSS FIGHT!";
    }

    hitEnemy(bullet, enemy) {
        bullet.setActive(false).setVisible(false).disableBody();
        enemy.health -= bullet.damage;
        
        if (enemy.health <= 0) {
            if (enemy.texture.key === 'boss') {
                alert("Boss Defeated! Final Score: " + this.score);
                location.reload();
            }
            enemy.destroy();
            this.updateCombo(true);
        }
    }

    hitPlayer() {
        this.cameras.main.shake(200, 0.02);
        this.updateCombo(false);
    }

    updateCombo(success) {
        if (success) {
            this.combo++;
            this.score += 10 * this.combo;
        } else {
            this.combo = 0;
        }

        const mods = this.getModifiers();
        document.getElementById('score').innerText = `Score: ${this.score}`;
        document.getElementById('combo').innerText = `Combo: ${this.combo}`;
        document.getElementById('stats').innerText = `Speed: ${Math.round(mods.speed*100)}% | Damage: ${Math.round(mods.damage*100)}%`;
    }

    getModifiers() {
        return {
            speed: 1 + (this.combo * 0.02),
            damage: 1 + (this.combo * 0.05)
        };
    }
}

class Bullet extends Phaser.Physics.Arcade.Sprite {
    fire(x, y, angle, damage) {
        this.enableBody(true, x, y, true, true);
        this.scene.physics.velocityFromRotation(angle, 500, this.body.velocity);
        this.damage = damage;
    }

    update() {
        // If bullet goes off screen, break combo
        if (this.active && (this.x < 0 || this.x > 800 || this.y < 0 || this.y > 600)) {
            this.scene.updateCombo(false);
            this.setActive(false).setVisible(false).disableBody();
        }
    }
}

const config = {
    type: Phaser.AUTO,
    width: 800,
    height: 600,
    physics: { default: 'arcade', arcade: { debug: false } },
    scene: MainScene
};

new Phaser.Game(config);
</script>
</body>
</html>
